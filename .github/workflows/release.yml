name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package or publish
        required: true
        type: string
      publish:
        description: Publish the existing draft after rebuilding all assets
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
            linkage: static
            shared: 'OFF'
            demos: 'ON'
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
            linkage: shared
            shared: 'ON'
            demos: 'ON'
          - os: macos-14
            platform: arm64-apple-darwin
            linkage: static
            shared: 'OFF'
            demos: 'ON'
          - os: macos-14
            platform: arm64-apple-darwin
            linkage: shared
            shared: 'ON'
            demos: 'ON'
          - os: windows-2022
            platform: x86_64-pc-windows-msvc
            linkage: static
            shared: 'OFF'
            demos: 'OFF'
          - os: windows-2022
            platform: x86_64-pc-windows-msvc
            linkage: shared
            shared: 'ON'
            demos: 'OFF'
    name: ${{ matrix.platform }}-${{ matrix.linkage }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - name: Validate existing tag and source version
        shell: bash
        run: |
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
          cmake -DDERECH_SOURCE_DIR="$PWD" \
            -DDERECH_RELEASE_TAG="$RELEASE_TAG" \
            -P cmake/CheckReleaseVersion.cmake
      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build \
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} \
            -DDERECH_BUILD_BENCH=ON \
            -DDERECH_BUILD_DEMO_SELFTESTS=${{ matrix.demos }} \
            -DDERECH_WERROR=ON \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Install
        shell: bash
        run: cmake --install build --prefix "$PWD/release-package" --config Release
      - name: Write bundle manifest
        shell: bash
        run: |
          cmake \
            -DOUTPUT="$PWD/release-package/manifest.txt" \
            -DTAG="$RELEASE_TAG" \
            -DCOMMIT="$(git rev-parse HEAD)" \
            -DPLATFORM=${{ matrix.platform }} \
            -DLINKAGE=${{ matrix.linkage }} \
            -DVERSION="${RELEASE_TAG#v}" \
            -DABI_VERSION=1 \
            -P cmake/WriteReleaseManifest.cmake
      - name: Archive and checksum
        id: archive
        shell: bash
        run: |
          mkdir -p artifacts
          archive="$PWD/artifacts/derech-$RELEASE_TAG-${{ matrix.platform }}-${{ matrix.linkage }}.zip"
          (cd release-package && \
            cmake -E tar cf "$archive" --format=zip .)
          cmake -DARTIFACT="$archive" -P cmake/WriteChecksum.cmake
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Attest archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.archive.outputs.archive }}
      - name: Upload package assets
        uses: actions/upload-artifact@v4
        with:
          name: derech-${{ matrix.platform }}-${{ matrix.linkage }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

  release:
    name: draft or publish release
    needs: package
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/* \
              --draft --generate-notes --title "derech $RELEASE_TAG"
          fi
          if [ "$PUBLISH" = "true" ]; then
            gh release edit "$RELEASE_TAG" --draft=false
          fi
